<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detetive de Bugs Python PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:95%;
max-width:950px;
background:#1e293b;
padding:20px;
border-radius:10px;
box-shadow:0 0 25px rgba(0,0,0,0.4);
}

h1,h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.home{
background:#3b82f6;
}

.code{
background:#020617;
padding:15px;
border-radius:6px;
font-family:monospace;
white-space:pre-wrap;
margin-top:10px;
}

.choice{
background:#334155;
padding:12px;
margin-top:8px;
border-radius:6px;
cursor:pointer;
}

.choice:hover{
background:#475569;
}

.hidden{
display:none;
}

.timer{
text-align:center;
font-size:18px;
margin-top:10px;
color:#facc15;
}

.progress{
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<!-- LOGIN -->

<div id="login">

<h1>🐍 Detetive de Bugs Python</h1>

<input id="playerName" placeholder="Digite seu nome">

<button onclick="login()">Entrar</button>
<button onclick="teacherMode()">Modo Professor</button>

</div>

<!-- MENU -->

<div id="menu" class="hidden">

<h2>Escolha o nível</h2>

<button onclick="startGame('facil')">Fácil</button>
<button onclick="startGame('medio')">Médio</button>
<button onclick="startGame('dificil')">Difícil</button>
<button onclick="startGame('inferno')">🔥 Inferno</button>

<div id="ranking"></div>

</div>

<!-- GAME -->

<div id="game" class="hidden">

<button class="home" onclick="goHome()">🏠 Home</button>

<h2 id="player"></h2>

<div class="timer" id="timer"></div>
<div class="progress" id="progress"></div>

<div id="questionBox"></div>

</div>

<!-- PROFESSOR -->

<div id="teacher" class="hidden">

<h2>Painel do Professor</h2>

<div id="teacherRanking"></div>

<button onclick="exitTeacher()">Voltar</button>

</div>

</div>

<script>

"use strict"

let player=""
let score=0
let current=0
let maxQuestions=10
let time=0
let timerInterval
let currentQuestion=null
let currentLevel=""
let usadas=[]

let bancoQuestoes={
facil:[],
medio:[],
dificil:[],
inferno:[]
}

function gerarQuestoes(){

for(let i=0;i<250;i++){

bancoQuestoes.facil.push({

code:`nome="Ana"
idade=${Math.floor(Math.random()*20)}
print(nome+idade)`,

choices:[
"Erro ao somar texto com número",
"Erro no print",
"Erro na variável"
],

answer:0,

explicacao:"Python não permite somar string com número."

})

}

for(let i=0;i<250;i++){

let n=Math.floor(Math.random()*10)

bancoQuestoes.medio.push({

code:`for i in range(${n})
 print(i)`,

choices:[
"Falta : no for",
"range inválido",
"print não funciona"
],

answer:0,

explicacao:"Laços for precisam de ':' no final."

})

}

for(let i=0;i<250;i++){

let n=Math.floor(Math.random()*6)+3

bancoQuestoes.dificil.push({

code:`lista=[1,2,3]
print(lista[${n}])`,

choices:[
"Índice inválido",
"Erro de sintaxe",
"Lista começa em 1"
],

answer:0,

explicacao:"Listas começam em índice 0."

})

}

for(let i=0;i<250;i++){

let n=Math.floor(Math.random()*10)

bancoQuestoes.inferno.push({

code:`x=[1,2,3]
y=x
y.append(${n})
print(x)`,

choices:[
"[1,2,3]",
"Lista modificada por referência",
"Erro de append"
],

answer:1,

explicacao:"Listas são passadas por referência."

})

}

}

gerarQuestoes()

function login(){

player=document.getElementById("playerName").value

if(player==="")return

document.getElementById("login").classList.add("hidden")
document.getElementById("menu").classList.remove("hidden")

updateRanking()

}

function teacherMode(){

document.getElementById("login").classList.add("hidden")
document.getElementById("teacher").classList.remove("hidden")

showTeacherRanking()

}

function exitTeacher(){

document.getElementById("teacher").classList.add("hidden")
document.getElementById("login").classList.remove("hidden")

}

function startGame(level){

currentLevel=level
score=0
current=0
usadas=[]

if(level==="facil")maxQuestions=5
if(level==="medio")maxQuestions=8
if(level==="dificil")maxQuestions=10
if(level==="inferno")maxQuestions=15

document.getElementById("menu").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")

document.getElementById("player").innerText="Jogador: "+player

startTimer()

loadQuestion()

}

function startTimer(){

time=0

timerInterval=setInterval(()=>{

time++

document.getElementById("timer").innerText="Tempo: "+time+"s"

},1000)

}

function stopTimer(){

clearInterval(timerInterval)

}

function randomBug(){

let lista=bancoQuestoes[currentLevel]

let disponiveis=lista.filter((q,i)=>!usadas.includes(i))

let index=Math.floor(Math.random()*disponiveis.length)

let pergunta=disponiveis[index]

usadas.push(lista.indexOf(pergunta))

return pergunta

}

function loadQuestion(){

if(current>=maxQuestions){

finishGame()
return

}

currentQuestion=randomBug()

document.getElementById("progress").innerText=
"Questão "+(current+1)+" de "+maxQuestions

let html=`<div class="code">${currentQuestion.code}</div>`

currentQuestion.choices.forEach((c,i)=>{

html+=`<div class="choice" onclick="answer(${i})">${c}</div>`

})

document.getElementById("questionBox").innerHTML=html

}

function answer(i){

if(i===currentQuestion.answer){

score++

alert("✔ Correto\n\n"+currentQuestion.explicacao)

}else{

alert("✖ Errado\n\n"+currentQuestion.explicacao)

}

current++

loadQuestion()

}

function medalha(score){

if(score>=14)return "🥇 Mestre Python"
if(score>=10)return "🥈 Programador"
if(score>=5)return "🥉 Iniciante"

return "🐣 Novato"

}

function finishGame(){

stopTimer()

saveScore()

alert(
"Pontuação: "+score+
"\nTempo: "+time+"s"+
"\nClassificação: "+medalha(score)
)

goHome()

}

function goHome(){

document.getElementById("game").classList.add("hidden")
document.getElementById("menu").classList.remove("hidden")

updateRanking()

}

function saveScore(){

let ranking=JSON.parse(localStorage.getItem("ranking")||"[]")

ranking.push({
name:player,
score:score,
time:time,
level:currentLevel
})

ranking.sort((a,b)=>b.score-a.score||a.time-b.time)

localStorage.setItem("ranking",JSON.stringify(ranking))

}

function updateRanking(){

let ranking=JSON.parse(localStorage.getItem("ranking")||"[]")

let html="<h3>Ranking</h3>"

ranking.slice(0,5).forEach(r=>{

html+=`<div>${r.name} — ${r.score} pts — ${r.level} — ${r.time}s</div>`

})

document.getElementById("ranking").innerHTML=html

}

function showTeacherRanking(){

let ranking=JSON.parse(localStorage.getItem("ranking")||"[]")

let html="<h3>Ranking Completo</h3>"

ranking.forEach(r=>{

html+=`<div>${r.name} — ${r.score} pts — ${r.level} — ${r.time}s</div>`

})

document.getElementById("teacherRanking").innerHTML=html

}

</script>

</body>
</html>
