<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Detetive de Bugs Python</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:95%;
max-width:900px;
background:#1e293b;
padding:20px;
border-radius:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-weight:bold;
}

.choice{
background:#334155;
padding:10px;
margin-top:8px;
border-radius:6px;
cursor:pointer;
}

.code{
background:#020617;
padding:15px;
border-radius:6px;
font-family:monospace;
white-space:pre-wrap;
margin-top:10px;
}

.hidden{
display:none;
}

.home{
background:#3b82f6;
}

.timer{
color:#facc15;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<div id="login">

<h1>🐍 Detetive de Bugs Python</h1>

<input id="playerName" placeholder="Digite seu nome">

<button onclick="login()">Entrar</button>

</div>

<div id="menu" class="hidden">

<h2>Escolha o nível</h2>

<button onclick="startGame('facil')">Fácil</button>
<button onclick="startGame('medio')">Médio</button>
<button onclick="startGame('dificil')">Difícil</button>
<button onclick="startGame('inferno')">🔥 Inferno</button>

<h3>Ranking</h3>
<div id="ranking"></div>

</div>

<div id="game" class="hidden">

<button class="home" onclick="goHome()">Home</button>

<h2 id="player"></h2>

<div class="timer" id="timer"></div>

<div id="questionBox"></div>

</div>

</div>

<script>

var player=""
var score=0
var questionIndex=0
var questions=[]

function login(){

player=document.getElementById("playerName").value

if(player==""){
alert("Digite seu nome")
return
}

document.getElementById("login").classList.add("hidden")
document.getElementById("menu").classList.remove("hidden")

updateRanking()

}

function startGame(level){

document.getElementById("menu").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")

document.getElementById("player").innerHTML="Jogador: "+player+" | Nível: "+level

score=0
questionIndex=0

questions=generateQuestions(level)

nextQuestion()

}

function goHome(){

document.getElementById("game").classList.add("hidden")
document.getElementById("menu").classList.remove("hidden")

updateRanking()

}

function nextQuestion(){

if(questionIndex>=questions.length){

saveScore()

alert("Fim! Pontuação: "+score)

goHome()

return

}

var q=questions[questionIndex]

var html=""

html+="<div class='code'>"+q.code+"</div>"

for(var i=0;i<q.choices.length;i++){

html+="<div class='choice' onclick='answer("+i+")'>"+q.choices[i]+"</div>"

}

document.getElementById("questionBox").innerHTML=html

}

function answer(i){

var q=questions[questionIndex]

if(i==q.correct){
score++
}

questionIndex++

nextQuestion()

}

function generateQuestions(level){

var arr=[]

for(var i=0;i<250;i++){

if(level=="facil"){

arr.push({

code:"print('Olá mundo'",
choices:[
"Falta )",
"Erro de indentação",
"Erro no print",
"Variável inexistente"
],
correct:0

})

}

if(level=="medio"){

arr.push({

code:"for i in range(5)\n print(i)",
choices:[
"Falta :",
"Erro de variável",
"range errado",
"print errado"
],
correct:0

})

}

if(level=="dificil"){

arr.push({

code:"lista=[1,2,3]\nprint(lista[3])",
choices:[
"Índice fora da lista",
"Erro de variável",
"Erro de print",
"Erro de sintaxe"
],
correct:0

})

}

if(level=="inferno"){

arr.push({

code:"def soma(a,b)\nreturn a+b\n\nprint(soma(2))",
choices:[
"Falta argumento",
"Erro de lista",
"Erro de indentação",
"Erro de print"
],
correct:0

})

}

}

return shuffle(arr)

}

function shuffle(array){

for(var i=array.length-1;i>0;i--){

var j=Math.floor(Math.random()*(i+1))

var temp=array[i]

array[i]=array[j]

array[j]=temp

}

return array

}

function saveScore(){

var ranking=JSON.parse(localStorage.getItem("ranking")||"[]")

ranking.push({

name:player,
score:score

})

ranking.sort(function(a,b){

return b.score-a.score

})

ranking=ranking.slice(0,10)

localStorage.setItem("ranking",JSON.stringify(ranking))

}

function updateRanking(){

var ranking=JSON.parse(localStorage.getItem("ranking")||"[]")

var html=""

for(var i=0;i<ranking.length;i++){

html+= (i+1)+". "+ranking[i].name+" - "+ranking[i].score+"<br>"

}

document.getElementById("ranking").innerHTML=html

}

</script>

</body>
</html>
